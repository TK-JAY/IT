<title>JAY IT | Premium Accounts & Social Growth</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Roboto:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Roboto',sans-serif;
background:#050914;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow-x:hidden;
}

/* neon background */

body::before{
content:"";
position:fixed;
width:600px;
height:600px;
background:#00d4ff;
filter:blur(220px);
opacity:.15;
top:-200px;
left:-200px;
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:600px;
height:600px;
background:#ff00ff;
filter:blur(220px);
opacity:.15;
bottom:-200px;
right:-200px;
z-index:-1;
}

/* container */

.container{
width:92%;
max-width:460px;
text-align:center;
}

/* logo */

.logo{
font-family:'Orbitron';
font-size:56px;
font-weight:900;
background:linear-gradient(180deg,#00d4ff,#008cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 35px #00d4ff;
margin-bottom:10px;
}

.tagline{
opacity:.8;
margin-bottom:25px;
}

/* social */

.social{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:20px;
}

.icon{
width:45px;
height:45px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
}

.fb{background:#1877f2}
.tiktok{background:#000}
.shopee{background:#ee4d2d}

/* card */

.card{
background:rgba(255,255,255,.04);
border:1px solid rgba(0,212,255,.2);
border-radius:20px;
padding:30px;
backdrop-filter:blur(12px);
box-shadow:0 0 25px rgba(0,212,255,.2);
}

/* pricing */

.price{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 16px;
border-radius:12px;
margin:8px 0;
background:rgba(255,255,255,.05);
font-weight:600;
}

.price span{
color:#ffd700;
font-family:'Orbitron';
}

/* button */

.btn{
display:block;
padding:18px;
margin-top:14px;
border-radius:16px;
text-decoration:none;
font-weight:700;
font-size:16px;
color:white;
background:linear-gradient(135deg,#00d4ff,#6a00ff);
box-shadow:0 0 20px rgba(0,212,255,.6);
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 40px #00d4ff;
}

/* floating buttons */

.float-btn{
position:fixed;
right:20px;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
color:white;
text-decoration:none;
box-shadow:0 0 25px rgba(0,0,0,.6);
z-index:999;
transition:.3s;
}

.float-btn:hover{
transform:scale(1.1);
}

.zalo{
bottom:100px;
background:#0068ff;
}

.call{
bottom:25px;
background:#00c853;
}

/* footer */

.footer{
margin-top:22px;
font-size:13px;
opacity:.7;
}

/* responsive */

@media(max-width:600px){

.logo{
font-size:44px;
}

.container{
width:94%;
}

}

</style>

</head>

<body>

</div>
